# render.yaml — Render Blueprint (Combined Web Service + Worker)
# Deploy: Render Dashboard → New → Blueprint → point at this repo.
services:
  - type: web
    name: surfshark-combined
    runtime: node
    region: singapore
    plan: free
    buildCommand: pnpm render:build && npx prisma migrate deploy
    startCommand: pnpm render:start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_ENC_KEY
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: "info"
      - key: PORT
        value: "3001"
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TG_SESSION
        sync: false
      - key: TG_SESSIONS
        sync: false
      - key: BOT_USERNAME
        value: "@SurfsharkBot"
      - key: WORKER_CONCURRENCY
        value: "5"
